services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrations:
    build:
      context: .
    command: uv run alembic upgrade head
    env_file:
      - .env
    depends_on:
      - postgres

  indexer:
    build: .
    command: uv run python -m services.indexer.main
    profiles:
      - tools
    environment:
      HF_HOME: /cache/huggingface
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - huggingface_cache:/cache/huggingface

volumes:
  postgres_data:
  huggingface_cache:
