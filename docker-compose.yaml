services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrations:
    build:
      context: .
    command: uv run alembic upgrade head
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres_data:
