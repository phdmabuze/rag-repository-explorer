services:
  api:
    build: 
      context: .
      dockerfile: ./docker/api/Dockerfile
    command: uv run uvicorn services.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HF_HOME: /cache/huggingface
    depends_on:
      - postgres
      - embedding
    volumes:
      - huggingface_cache:/cache/huggingface

  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrations:
    build: 
      context: .
      dockerfile: ./docker/migrations/Dockerfile
    command: uv run alembic upgrade head
    env_file:
      - .env
    depends_on:
      - postgres

  indexer:
    build: 
      context: .
      dockerfile: ./docker/indexer/Dockerfile
    command: python -m services.indexer.main
    profiles:
      - tools
    environment:
      HF_HOME: /cache/huggingface
    env_file:
      - .env
    depends_on:
      - postgres
      - embedding
    volumes:
      - huggingface_cache:/cache/huggingface
  
  embedding:
    build:
      context: .
      dockerfile: ./docker/embedding/Dockerfile
    command: uv run uvicorn services.embedding.main:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    env_file:
      - .env
    environment:
      HF_HOME: /cache/huggingface
    volumes:
      - huggingface_cache:/cache/huggingface

volumes:
  postgres_data:
  huggingface_cache:
